apiVersion: 1

# ClickHouse OLAP datasource — business/KPI dashboards read cumulative data here
# (predictions, chat_events written by the Analytics Kafka consumer). Prometheus
# stays the source for operational metrics (latency, CPU, GPU, Kafka lag).
# Credentials come from the container environment (set in docker-compose.yml).
datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse
    access: proxy
    editable: true
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      secure: false
      username: $CLICKHOUSE_USER
      defaultDatabase: $CLICKHOUSE_DB
      dialTimeout: 10
      queryTimeout: 60
    secureJsonData:
      password: $CLICKHOUSE_PASSWORD
