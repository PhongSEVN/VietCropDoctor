{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ include "vietcropdoctor.namespace" $ }}
  labels:
    app: {{ $name }}
    {{- include "vietcropdoctor.labels" (dict "svcName" $name "root" $) | nindent 4 }}
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      app: {{ $name }}
      {{- include "vietcropdoctor.selectorLabels" (dict "svcName" $name "root" $) | nindent 6 }}
  template:
    metadata:
      labels:
        app: {{ $name }}
        {{- include "vietcropdoctor.selectorLabels" (dict "svcName" $name "root" $) | nindent 8 }}
    spec:
      containers:
        - name: {{ $name }}
          image: {{ include "vietcropdoctor.image" (dict "svc" $svc "root" $) }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.containerPort }}
              protocol: TCP
          {{- if $svc.config }}
          envFrom:
            - configMapRef:
                name: {{ $name }}-config
          {{- end }}
          {{- if $svc.secretEnv }}
          env:
            {{- range $svc.secretEnv }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $svc.containerPort }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ $svc.containerPort }}
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
      {{- if $svc.nodeSelector }}
      nodeSelector:
        {{- toYaml $svc.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if $svc.tolerations }}
      tolerations:
        {{- toYaml $svc.tolerations | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
