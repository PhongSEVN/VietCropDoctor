{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled $svc.config }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-config
  namespace: {{ include "vietcropdoctor.namespace" $ }}
  labels:
    app: {{ $name }}
    {{- include "vietcropdoctor.labels" (dict "svcName" $name "root" $) | nindent 4 }}
data:
  {{- range $k, $v := $svc.config }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
{{- end }}
