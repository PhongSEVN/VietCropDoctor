{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ include "vietcropdoctor.namespace" $ }}
  labels:
    app: {{ $name }}
    {{- include "vietcropdoctor.labels" (dict "svcName" $name "root" $) | nindent 4 }}
spec:
  type: {{ $svc.serviceType | default "ClusterIP" }}
  selector:
    app: {{ $name }}
    {{- include "vietcropdoctor.selectorLabels" (dict "svcName" $name "root" $) | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.containerPort }}
      targetPort: {{ $svc.containerPort }}
      protocol: TCP
{{- end }}
{{- end }}
