apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: vietcropdoctor
  labels:
    app: auth
    app.kubernetes.io/name: auth
    app.kubernetes.io/component: security
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
        app.kubernetes.io/name: auth
    spec:
      containers:
        - name: auth
          image: ghcr.io/vietcropdoctor/auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8005
              protocol: TCP
          envFrom:
            - configMapRef:
                name: auth-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vietcropdoctor-secrets
                  key: JWT_SECRET
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: vietcropdoctor-secrets
                  key: POSTGRES_DSN
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
