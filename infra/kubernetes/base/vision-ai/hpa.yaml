apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vision-ai
  namespace: vietcropdoctor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vision-ai
  minReplicas: 1   # limited by GPU node availability
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
