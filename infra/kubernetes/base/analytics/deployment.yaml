apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: vietcropdoctor
  labels:
    app: analytics
    app.kubernetes.io/name: analytics
    app.kubernetes.io/component: observability
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
        app.kubernetes.io/name: analytics
    spec:
      containers:
        - name: analytics
          image: ghcr.io/vietcropdoctor/analytics:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8004
              protocol: TCP
          envFrom:
            - configMapRef:
                name: analytics-config
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vietcropdoctor-secrets
                  key: CLICKHOUSE_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
