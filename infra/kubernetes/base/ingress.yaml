apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vietcropdoctor
  namespace: vietcropdoctor
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    # Enable CORS at the ingress level (gateway handles it internally too)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization"
spec:
  ingressClassName: nginx
  rules:
    - host: api.vietcropdoctor.vn
      http:
        paths:
          - path: /predict
            pathType: Prefix
            backend:
              service:
                name: vision-ai
                port:
                  number: 8001
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: vision-ai
                port:
                  number: 8001
          - path: /diseases
            pathType: Prefix
            backend:
              service:
                name: vision-ai
                port:
                  number: 8001
          - path: /query
            pathType: Prefix
            backend:
              service:
                name: rag-engine
                port:
                  number: 8002
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: rag-engine
                port:
                  number: 8002
          - path: /ingest
            pathType: Prefix
            backend:
              service:
                name: rag-engine
                port:
                  number: 8002
          - path: /analytics
            pathType: Prefix
            backend:
              service:
                name: analytics
                port:
                  number: 8004
