apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  namespace: vietcropdoctor
data:
  REDIS_URL: "redis://redis:6379/1"
  LOG_LEVEL: "INFO"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vision-ai-config
  namespace: vietcropdoctor
data:
  MODEL_PATH: "/models/best_model.pth"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
  REDIS_URL: "redis://redis:6379/0"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  ENSEMBLE_ENABLED: "true"
  LOG_LEVEL: "INFO"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-engine-config
  namespace: vietcropdoctor
data:
  QDRANT_HOST: "qdrant"
  QDRANT_PORT: "6333"
  QDRANT_COLLECTION: "plant_diseases_vn"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
  OLLAMA_BASE_URL: "http://ollama:11434"
  LLM_MODEL: "qwen2.5:7b"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  LOG_LEVEL: "INFO"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-config
  namespace: vietcropdoctor
data:
  VISION_AI_URL: "http://vision-ai:8001"
  RAG_ENGINE_URL: "http://rag-engine:8002"
  OLLAMA_BASE_URL: "http://ollama:11434"
  REASONING_MODEL: "qwen2.5:7b"
  LOG_LEVEL: "INFO"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-config
  namespace: vietcropdoctor
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
  CLICKHOUSE_HOST: "clickhouse"
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_DB: "vietcropdoctor"
  CLICKHOUSE_USER: "admin"
  LOG_LEVEL: "INFO"
