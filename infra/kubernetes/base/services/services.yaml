apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: vietcropdoctor
  labels:
    app: gateway
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: auth
