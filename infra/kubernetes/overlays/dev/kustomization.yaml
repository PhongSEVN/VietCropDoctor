apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vietcropdoctor

resources:
  - ../../base

# Scale all deployments down to 1 replica for dev
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: rag-engine

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: analytics

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: gateway

# Use dev image tags
images:
  - name: ghcr.io/vietcropdoctor/vision-ai
    newTag: dev
  - name: ghcr.io/vietcropdoctor/rag-engine
    newTag: dev
  - name: ghcr.io/vietcropdoctor/analytics
    newTag: dev
  - name: ghcr.io/vietcropdoctor/gateway
    newTag: dev
