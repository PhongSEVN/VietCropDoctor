name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. sha-abc1234 or latest)"
        required: true
        default: "latest"
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true

env:
  AWS_REGION: ap-southeast-1
  CLUSTER_NAME: vietcropdoctor-prod
  NAMESPACE: vietcropdoctor

jobs:
  gate-check:
    name: Pre-deployment Gate Check
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation input
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]]; then
            echo "Confirmation input must be 'DEPLOY'. Aborting."
            exit 1
          fi

  deploy-prod:
    name: Deploy to Production Cluster
    runs-on: ubuntu-latest
    needs: gate-check
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for prod cluster
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Apply manifests to production
        run: |
          kubectl apply -k k8s/overlays/prod/

      - name: Wait for rollouts to complete
        run: |
          for deploy in vision-ai rag-engine analytics auth orchestrator gateway; do
            echo "Waiting for $deploy rollout..."
            kubectl rollout status deployment/$deploy \
              -n ${{ env.NAMESPACE }} \
              --timeout=600s
          done

      - name: Verify production deployment health
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get services -n ${{ env.NAMESPACE }}

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Production deployment FAILED. Rolling back..."
          for deploy in vision-ai rag-engine analytics auth orchestrator gateway; do
            kubectl rollout undo deployment/$deploy -n ${{ env.NAMESPACE }} || true
          done

      - name: Notify on failure
        if: failure()
        run: |
          echo "Production deployment FAILED for commit ${{ github.sha }}"
          # Add Slack/email notification here
