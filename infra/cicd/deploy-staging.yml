name: Deploy to Staging

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types: [completed]
    branches: [main]

env:
  AWS_REGION: ap-southeast-1
  CLUSTER_NAME: vietcropdoctor-staging
  NAMESPACE: vietcropdoctor

jobs:
  deploy-staging:
    name: Deploy to Staging Cluster
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for staging cluster
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Apply manifests to staging
        run: |
          kubectl apply -k k8s/overlays/staging/

      - name: Wait for rollouts to complete
        run: |
          for deploy in vision-ai rag-engine analytics auth orchestrator gateway; do
            echo "Waiting for $deploy rollout..."
            kubectl rollout status deployment/$deploy \
              -n ${{ env.NAMESPACE }} \
              --timeout=300s
          done

      - name: Verify deployment health
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get services -n ${{ env.NAMESPACE }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "Staging deployment FAILED for commit ${{ github.sha }}"
          # Add Slack/email notification here if desired
