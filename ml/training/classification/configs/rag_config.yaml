embedding:
  model: "text-embedding-3-small"
  dimensions: 1536

reranker:
  enabled: true
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k_retrieve: 5
  top_k_rerank: 3

qdrant:
  mode: "docker"          # "memory" | "docker"
  host: "localhost"
  port: 6333
  collection: "crop_diseases_vn"

chunking:
  chunk_size: 300         # characters (proxy for tokens)
  overlap: 50

llm:
  provider: "ollama"
  model: "qwen2.5:7b"
  base_url: "http://localhost:11434"
  temperature: 0.2
  timeout: 120
  max_history: 5

knowledge_dir: "rag/knowledge"

crawl:
  timeout: 10
  user_agent: "Mozilla/5.0 (compatible; PlantDiseaseBot/1.0)"
  sources:
    - "https://ppd.gov.vn"
    - "https://cuctrongtrot.gov.vn"
    - "https://vaas.org.vn"
