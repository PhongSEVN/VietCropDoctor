# ─────────────────────────────────────────────────────────────────────────────
#  Server block — all routing rules
#
#  CORS note (development mode):
#    add_header in a parent block is NOT inherited by child blocks that define
#    their own add_header directives — this is a known nginx quirk.
#    Every location that adds its own headers must repeat the CORS set.
#    A CORS_HEADERS macro is defined below to keep this DRY.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ── Security headers (repeated in every location that has its own add_header)
    add_header X-Content-Type-Options  "nosniff"                                   always;
    add_header X-Frame-Options         "DENY"                                      always;
    add_header X-XSS-Protection        "1; mode=block"                             always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"     always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"           always;

    # ── CORS — allow all origins (development only) ───────────────────────────
    add_header 'Access-Control-Allow-Origin'   '*'                                        always;
    add_header 'Access-Control-Allow-Methods'  'GET, POST, PUT, DELETE, OPTIONS'          always;
    add_header 'Access-Control-Allow-Headers'  'Authorization, Content-Type, X-Request-ID, Accept' always;
    add_header 'Access-Control-Expose-Headers' 'X-Request-ID'                             always;

    # OPTIONS preflight — return immediately without hitting any upstream
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Internal auth-request subrequest targets (not accessible externally) ──

    # Validates any authenticated user (farmer/agronomist/admin)
    location = /auth-validate {
        internal;
        proxy_pass              http://auth_service/auth/_validate;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length  "";
        proxy_set_header        X-Original-URI  $request_uri;
        proxy_set_header        Authorization   $http_authorization;
    }

    # Validates admin role only
    location = /auth-validate-admin {
        internal;
        proxy_pass              http://auth_service/auth/_validate/admin;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length  "";
        proxy_set_header        X-Original-URI  $request_uri;
        proxy_set_header        Authorization   $http_authorization;
    }

    # Validates agronomist or admin role
    location = /auth-validate-agronomist {
        internal;
        proxy_pass              http://auth_service/auth/_validate/agronomist;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length  "";
        proxy_set_header        X-Original-URI  $request_uri;
        proxy_set_header        Authorization   $http_authorization;
    }

    # ── Auth service (public — no auth_request) ───────────────────────────────
    location ~ ^/auth/ {
        proxy_pass       http://auth_service;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;

        # Repeat all headers (nginx add_header inheritance quirk)
        add_header X-Content-Type-Options  "nosniff"                                always;
        add_header X-Frame-Options         "DENY"                                   always;
        add_header X-XSS-Protection        "1; mode=block"                          always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"  always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"        always;
        add_header 'Access-Control-Allow-Origin'   '*'                              always;
        add_header 'Access-Control-Allow-Methods'  'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'  'Authorization, Content-Type, X-Request-ID, Accept' always;
        add_header 'Access-Control-Expose-Headers' 'X-Request-ID'                  always;
    }

    # ── Auth service health (pass-through, no auth_request) ─────────────────
    location = /health/auth {
        proxy_pass http://auth_service/health;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_read_timeout 10s;
    }

    # ── Gateway self health (no upstream, nginx responds directly) ────────────
    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"gateway"}';
    }

    # ── Per-service health pass-through ───────────────────────────────────────
    location = /health/vision {
        proxy_pass http://vision_ai/health;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    location = /health/rag {
        proxy_pass http://rag_engine/health;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # ── Service registry (health aggregator sidecar) ──────────────────────────
    location = /api/services {
        proxy_pass http://health_aggregator/;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_read_timeout 15s;
    }

    # ── Vision-AI: POST /predict — requires authenticated user ────────────────
    location = /predict {
        auth_request      /auth-validate;
        auth_request_set  $x_user_id    $upstream_http_x_user_id;
        auth_request_set  $x_user_role  $upstream_http_x_user_role;
        auth_request_set  $x_username   $upstream_http_x_username;

        limit_req zone=predict_zone burst=5 nodelay;

        proxy_pass       http://vision_ai/predict;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-User-Id        $x_user_id;
        proxy_set_header X-User-Role      $x_user_role;
        proxy_set_header X-Username       $x_username;
        proxy_read_timeout 60s;

        error_page 401 = @auth_error_401;
        error_page 403 = @auth_error_403;
    }

    # Vision-AI: GET /diseases (no auth — cheap public read)
    location = /diseases {
        proxy_pass http://vision_ai/diseases;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ── RAG Engine: POST /query — requires authenticated user ─────────────────
    location = /query {
        auth_request      /auth-validate;
        auth_request_set  $x_user_id    $upstream_http_x_user_id;
        auth_request_set  $x_user_role  $upstream_http_x_user_role;
        auth_request_set  $x_username   $upstream_http_x_username;

        limit_req zone=query_zone burst=10 nodelay;

        proxy_pass         http://rag_engine/query;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Request-ID     $request_id;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-User-Id        $x_user_id;
        proxy_set_header   X-User-Role      $x_user_role;
        proxy_set_header   X-Username       $x_username;

        # SSE: disable all buffering so tokens reach the client immediately
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 120s;

        add_header X-Content-Type-Options  "nosniff"                                always;
        add_header X-Frame-Options         "DENY"                                   always;
        add_header X-XSS-Protection        "1; mode=block"                          always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"  always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"        always;
        add_header 'Access-Control-Allow-Origin'   '*'                              always;
        add_header 'Access-Control-Allow-Methods'  'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'  'Authorization, Content-Type, X-Request-ID, Accept' always;
        add_header 'Access-Control-Expose-Headers' 'X-Request-ID'                  always;
        add_header  X-Accel-Buffering              no                               always;

        error_page 401 = @auth_error_401;
        error_page 403 = @auth_error_403;
    }

    # ── RAG Engine: GET /chat-history — requires authenticated user ──────────
    location = /chat-history {
        auth_request      /auth-validate;
        auth_request_set  $x_user_id    $upstream_http_x_user_id;
        auth_request_set  $x_user_role  $upstream_http_x_user_role;

        proxy_pass       http://rag_engine/chat-history;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-User-Id        $x_user_id;
        proxy_set_header X-User-Role      $x_user_role;
        proxy_read_timeout 15s;

        error_page 401 = @auth_error_401;
        error_page 403 = @auth_error_403;
    }

    # ── RAG Engine: /feedback — requires authenticated user (GET history, POST submit)
    location = /feedback {
        auth_request      /auth-validate;
        auth_request_set  $x_user_id    $upstream_http_x_user_id;
        auth_request_set  $x_user_role  $upstream_http_x_user_role;

        proxy_pass       http://rag_engine/feedback;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-User-Id        $x_user_id;
        proxy_set_header X-User-Role      $x_user_role;
        proxy_read_timeout 30s;

        error_page 401 = @auth_error_401;
        error_page 403 = @auth_error_403;
    }

    # ── RAG Engine: POST /chat (public — used by anonymous users) ────────────
    location = /chat {
        proxy_pass       http://rag_engine/chat;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── RAG Engine: POST /ingest — requires admin role ────────────────────────
    location = /ingest {
        auth_request      /auth-validate-admin;
        auth_request_set  $x_user_id    $upstream_http_x_user_id;
        auth_request_set  $x_user_role  $upstream_http_x_user_role;

        limit_req zone=ingest_zone burst=2 nodelay;

        proxy_pass       http://rag_engine/ingest;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-User-Id        $x_user_id;
        proxy_set_header X-User-Role      $x_user_role;
        proxy_read_timeout 300s;

        error_page 401 = @auth_error_401;
        error_page 403 = @auth_error_403;
    }

    # POST /ingest/upload — admin only, shares ingest rate limit
    location = /ingest/upload {
        auth_request      /auth-validate-admin;
        auth_request_set  $x_user_id    $upstream_http_x_user_id;
        auth_request_set  $x_user_role  $upstream_http_x_user_role;

        limit_req zone=ingest_zone burst=2 nodelay;

        proxy_pass       http://rag_engine/ingest/upload;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-User-Id        $x_user_id;
        proxy_set_header X-User-Role      $x_user_role;
        proxy_read_timeout 60s;

        error_page 401 = @auth_error_401;
        error_page 403 = @auth_error_403;
    }

    # POST /reindex — admin only
    location = /reindex {
        auth_request      /auth-validate-admin;
        auth_request_set  $x_user_id    $upstream_http_x_user_id;
        auth_request_set  $x_user_role  $upstream_http_x_user_role;

        limit_req zone=ingest_zone burst=1 nodelay;

        proxy_pass       http://rag_engine/reindex;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-User-Id        $x_user_id;
        proxy_set_header X-User-Role      $x_user_role;
        proxy_read_timeout 600s;

        error_page 401 = @auth_error_401;
        error_page 403 = @auth_error_403;
    }

    # GET/DELETE /collection — admin only
    location = /collection {
        auth_request      /auth-validate-admin;
        auth_request_set  $x_user_id    $upstream_http_x_user_id;
        auth_request_set  $x_user_role  $upstream_http_x_user_role;

        proxy_pass       http://rag_engine/collection;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-User-Id        $x_user_id;
        proxy_set_header X-User-Role      $x_user_role;

        error_page 401 = @auth_error_401;
        error_page 403 = @auth_error_403;
    }

    # ── Per-user diagnosis history — requires any authenticated user ──────────
    location = /analytics/history {
        auth_request      /auth-validate;
        auth_request_set  $x_user_id    $upstream_http_x_user_id;
        auth_request_set  $x_user_role  $upstream_http_x_user_role;

        proxy_pass       http://analytics/analytics/history;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-User-Id        $x_user_id;
        proxy_set_header X-User-Role      $x_user_role;
        proxy_read_timeout 15s;

        add_header X-Content-Type-Options  "nosniff"                                always;
        add_header X-Frame-Options         "DENY"                                   always;
        add_header X-XSS-Protection        "1; mode=block"                          always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"  always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"        always;
        add_header 'Access-Control-Allow-Origin'   '*'                              always;
        add_header 'Access-Control-Allow-Methods'  'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'  'Authorization, Content-Type, X-Request-ID, Accept' always;
        add_header 'Access-Control-Expose-Headers' 'X-Request-ID'                  always;

        error_page 401 = @auth_error_401;
        error_page 403 = @auth_error_403;
    }

    # ── Analytics service — requires agronomist or admin ─────────────────────
    location /analytics/ {
        auth_request      /auth-validate-agronomist;
        auth_request_set  $x_user_id    $upstream_http_x_user_id;
        auth_request_set  $x_user_role  $upstream_http_x_user_role;

        proxy_pass       http://analytics/analytics/;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-User-Id        $x_user_id;
        proxy_set_header X-User-Role      $x_user_role;
        proxy_read_timeout 30s;

        error_page 401 = @auth_error_401;
        error_page 403 = @auth_error_403;
    }

    # ── Admin API — requires admin role ───────────────────────────────────────
    location /api/admin/ {
        auth_request      /auth-validate-admin;
        auth_request_set  $x_user_id    $upstream_http_x_user_id;
        auth_request_set  $x_user_role  $upstream_http_x_user_role;

        proxy_pass       http://auth_service/admin/;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header Authorization    $http_authorization;
        proxy_set_header X-User-Id        $x_user_id;
        proxy_set_header X-User-Role      $x_user_role;
        proxy_read_timeout 30s;

        error_page 401 = @auth_error_401;
        error_page 403 = @auth_error_403;
    }

    # ── Expert API — requires agronomist or admin (router lives in rag-engine) ──
    location /api/expert/ {
        auth_request      /auth-validate-agronomist;
        auth_request_set  $x_user_id    $upstream_http_x_user_id;
        auth_request_set  $x_user_role  $upstream_http_x_user_role;

        proxy_pass       http://rag_engine/expert/;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header Authorization    $http_authorization;
        proxy_set_header X-User-Id        $x_user_id;
        proxy_set_header X-User-Role      $x_user_role;
        proxy_read_timeout 30s;

        error_page 401 = @auth_error_401;
        error_page 403 = @auth_error_403;
    }

    # ── Auth error handlers ───────────────────────────────────────────────────
    location @auth_error_401 {
        default_type application/json;
        return 401 '{"error":"Unauthorized","detail":"Valid JWT required"}';
    }

    location @auth_error_403 {
        default_type application/json;
        return 403 '{"error":"Forbidden","detail":"Insufficient role"}';
    }

    # ── Orchestrator: POST /orchestrate — requires authenticated user ─────────
    location = /orchestrate {
        auth_request      /auth-validate;
        auth_request_set  $x_user_id    $upstream_http_x_user_id;
        auth_request_set  $x_user_role  $upstream_http_x_user_role;

        proxy_pass       http://orchestrator/orchestrate;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-User-Id        $x_user_id;
        proxy_set_header X-User-Role      $x_user_role;
        proxy_read_timeout 120s;
        client_max_body_size 12m;

        error_page 401 = @auth_error_401;
        error_page 403 = @auth_error_403;
    }

    location = /health/orchestrator {
        proxy_pass http://orchestrator/health;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;
        proxy_read_timeout 10s;
    }

    # ── Catch-all: 404 ───────────────────────────────────────────────────────
    location / {
        default_type application/json;
        return 404 '{"error":"not found","hint":"see /api/services for available endpoints"}';
    }
}
