# ─────────────────────────────────────────────────────────────────────────────
#  Upstream definitions
#
#  Service names match docker-compose container names on the vcd-net network.
#  keepalive N — idle keepalive connections to the upstream pool.
# ─────────────────────────────────────────────────────────────────────────────

upstream vision_ai {
    server vision-ai:8001;
    keepalive 16;
}

upstream rag_engine {
    server rag-engine:8002;
    keepalive 16;
}

upstream analytics {
    server analytics:8004;
    keepalive 8;
}

upstream auth_service {
    server auth:8005;
    keepalive 8;
}

upstream orchestrator {
    server orchestrator:8006;
    keepalive 8;
}

# Health aggregator sidecar running inside this container on loopback
upstream health_aggregator {
    server 127.0.0.1:8099;
    keepalive 2;
}

# ── WebSocket connection upgrade map ──────────────────────────────────────────
# Must be declared at http level (here) so routes.conf can reference it.
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
}
