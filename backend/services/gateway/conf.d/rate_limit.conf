# ─────────────────────────────────────────────────────────────────────────────
#  Rate limiting zones
#
#  Key: binary client IP (4 bytes IPv4 / 16 bytes IPv6)
#  Each zone uses 10 MB of shared memory (~160 k IP entries per zone).
#
#  Rates are intentionally conservative for a dev/demo deployment:
#    predict_zone  10 r/m  — heavy CV inference, GPU-bound
#    query_zone    30 r/m  — RAG + LLM, moderate cost
#    ingest_zone    2 r/m  — admin-only bulk ingestion
# ─────────────────────────────────────────────────────────────────────────────

limit_req_zone $binary_remote_addr zone=predict_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=query_zone:10m   rate=30r/m;
limit_req_zone $binary_remote_addr zone=ingest_zone:10m  rate=2r/m;
