# ─────────────────────────────────────────────────────────────────────────────
#  VietCropDoctor — Nginx main config
#
#  Layout:
#    conf.d/rate_limit.conf  — limit_req_zone definitions
#    conf.d/upstream.conf    — upstream blocks + WebSocket map
#    conf.d/routes.conf      — server block with all location rules
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Include request_id in every log line for tracing
    log_format main '$remote_addr - [$time_local] "$request" $status '
                    '$body_bytes_sent req_id=$request_id upstream=$upstream_addr';
    access_log /var/log/nginx/access.log main;

    sendfile           on;
    keepalive_timeout  65;

    # Global proxy defaults
    client_max_body_size  10m;          # image uploads
    proxy_read_timeout    120s;         # LLM inference is slow
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_http_version    1.1;          # enable keepalive to upstreams

    # Return 429 (Too Many Requests) instead of default 503 for rate limits
    limit_req_status 429;

    include /etc/nginx/conf.d/*.conf;
}
