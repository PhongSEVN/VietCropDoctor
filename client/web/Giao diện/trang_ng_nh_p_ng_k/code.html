<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng nhập / Đăng ký - VietCropDoctor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f4fcf0",
                        "on-surface": "#171d16",
                        "tertiary-container": "#c74668",
                        "tertiary": "#a72d51",
                        "surface-dim": "#d5dcd1",
                        "surface-tint": "#006e2d",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#ecf3e7",
                        "surface-container-low": "#eff6ea",
                        "surface-bright": "#f4fcf0",
                        "inverse-primary": "#62df7d",
                        "surface-container": "#e9f0e5",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#ffdcc3",
                        "tertiary-fixed-dim": "#ffb2bf",
                        "primary-container": "#00873a",
                        "secondary": "#904d00",
                        "on-primary-fixed-variant": "#005320",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#dde5d9",
                        "surface-variant": "#dde5d9",
                        "on-background": "#171d16",
                        "primary": "#006b2c",
                        "on-secondary-fixed": "#2f1500",
                        "on-secondary-fixed-variant": "#6e3900",
                        "on-tertiary-fixed": "#3f0016",
                        "on-secondary": "#ffffff",
                        "primary-fixed": "#7ffc97",

                        "inverse-surface": "#2b322b",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#663500",
                        "surface-container-high": "#e3eadf",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#3e4a3d",
                        "on-tertiary-container": "#fffbff",
                        "surface": "#f4fcf0",
                        "on-tertiary-fixed-variant": "#8a143c",
                        "outline": "#6e7b6c",
                        "secondary-container": "#fe932c",
                        "outline-variant": "#bdcaba",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#62df7d",
                        "tertiary-fixed": "#ffd9de",
                        "on-primary-container": "#f7fff2",
                        "secondary-fixed-dim": "#ffb77d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "component-gap": "12px",
                        "container-padding-mobile": "16px",
                        "gutter": "24px",

                    },
                    "fontFamily": {

                        "body-md": ["Inter"],

                    },
                    "fontSize": {

                        "title-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],

                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }]

                }
            }
        }

<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-container-padding-mobile md:p-container-padding-desktop relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none opacity-20">
<div class="absolute -top-40 -right-40 w-96 h-96 bg-primary-container rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
<div class="absolute top-40 -left-40 w-72 h-72 bg-secondary-container rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000"></div>
<div class="absolute -bottom-40 left-20 w-80 h-80 bg-tertiary-container rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-4000"></div>
</div>
<!-- Main Container -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm z-10 relative overflow-hidden flex flex-col">
<!-- Header / Logo Area -->
<div class="pt-10 pb-6 px-8 flex flex-col items-center border-b border-surface-container-high bg-surface">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mb-4 text-on-primary-container shadow-sm">
<span class="material-symbols-outlined text-3xl icon-fill" data-icon="potted_plant">potted_plant</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary md:hidden">VietCropDoctor</h1>
<h1 class="font-headline-lg text-headline-lg text-primary hidden md:block">VietCropDoctor</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2 text-center">Chuyên gia kỹ thuật số về sức khỏe cây trồng</p>
</div>
<!-- Form Area -->
<div class="p-8 bg-surface-container-lowest flex-grow">
<!-- Tabs -->
<div class="flex border-b border-outline-variant mb-6">
<button class="flex-1 pb-3 text-center font-title-md text-title-md font-bold text-primary border-b-2 border-primary transition-colors" id="tab-login" onclick="switchTab('login')">
                    Đăng nhập
                </button>
<button class="flex-1 pb-3 text-center font-title-md text-title-md text-on-surface-variant hover:text-on-surface transition-colors" id="tab-register" onclick="switchTab('register')">
                    Đăng ký
                </button>
</div>
<!-- Login Form -->
<form action="#" class="space-y-unit" id="form-login" method="POST">
<div class="mb-gutter">
<label class="block font-label-md text-label-md text-on-surface mb-2" for="login-email">Email hoặc Số điện thoại</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl" data-icon="person">person</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline rounded focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface placeholder-outline-variant transition-shadow" id="login-email" name="login-email" placeholder="nhap@email.com" type="text"/>
</div>
</div>
<div class="mb-gutter">
<div class="flex justify-between items-center mb-2">
<label class="block font-label-md text-label-md text-on-surface" for="login-password">Mật khẩu</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl" data-icon="lock">lock</span>
</div>
<input class="w-full pl-10 pr-10 py-3 bg-surface-container-lowest border border-outline rounded focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface placeholder-outline-variant transition-shadow" id="login-password" name="login-password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors" onclick="togglePassword('login-password', 'login-pwd-icon')" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility" id="login-pwd-icon">visibility</span>
</button>
</div>
</div>
<div class="flex items-center mb-gutter">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline rounded bg-surface-container-lowest" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-md text-body-md text-on-surface-variant" for="remember-me">
                        Ghi nhớ đăng nhập
                    </label>
</div>
<button class="w-full py-3 px-4 bg-primary text-on-primary rounded font-label-md text-label-md font-bold shadow-sm hover:bg-primary-container hover:text-on-primary-container transition-colors flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined" data-icon="login">login</span>
                    Đăng nhập
                </button>
</form>
<!-- Register Form (Hidden by default) -->
<form action="#" class="space-y-unit hidden" id="form-register" method="POST">
<div class="mb-gutter">
<label class="block font-label-md text-label-md text-on-surface mb-2" for="reg-name">Họ và Tên</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl" data-icon="badge">badge</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline rounded focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface placeholder-outline-variant transition-shadow" id="reg-name" name="reg-name" placeholder="Nguyễn Văn A" type="text"/>
</div>
</div>
<div class="mb-gutter">
<label class="block font-label-md text-label-md text-on-surface mb-2" for="reg-email">Email hoặc Số điện thoại</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl" data-icon="mail">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline rounded focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface placeholder-outline-variant transition-shadow" id="reg-email" name="reg-email" placeholder="nhap@email.com" type="text"/>
</div>
</div>
<div class="mb-gutter">
<label class="block font-label-md text-label-md text-on-surface mb-2" for="reg-password">Mật khẩu</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl" data-icon="lock">lock</span>
</div>
<input class="w-full pl-10 pr-10 py-3 bg-surface-container-lowest border border-outline rounded focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface placeholder-outline-variant transition-shadow" id="reg-password" name="reg-password" placeholder="Tạo mật khẩu mạnh" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors" onclick="togglePassword('reg-password', 'reg-pwd-icon')" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility" id="reg-pwd-icon">visibility</span>
</button>
</div>
</div>
<button class="w-full py-3 px-4 bg-primary text-on-primary rounded font-label-md text-label-md font-bold shadow-sm hover:bg-primary-container hover:text-on-primary-container transition-colors flex items-center justify-center gap-2 mt-6" type="submit">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
                    Tạo tài khoản
                </button>
<p class="font-label-sm text-label-sm text-center text-on-surface-variant mt-4">
                    Bằng việc đăng ký, bạn đồng ý với <a class="text-primary hover:underline" href="#">Điều khoản dịch vụ</a> và <a class="text-primary hover:underline" href="#">Chính sách bảo mật</a> của chúng tôi.
                </p>
</form>
</div>
</div>
<script>
        function switchTab(tabId) {
            const loginTab = document.getElementById('tab-login');
            const registerTab = document.getElementById('tab-register');
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');

            if (tabId === 'login') {
                loginTab.classList.add('font-bold', 'text-primary', 'border-b-2', 'border-primary');
                loginTab.classList.remove('text-on-surface-variant');
                
                registerTab.classList.remove('font-bold', 'text-primary', 'border-b-2', 'border-primary');
                registerTab.classList.add('text-on-surface-variant');

                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            } else {
                registerTab.classList.add('font-bold', 'text-primary', 'border-b-2', 'border-primary');
                registerTab.classList.remove('text-on-surface-variant');
                
                loginTab.classList.remove('font-bold', 'text-primary', 'border-b-2', 'border-primary');
                loginTab.classList.add('text-on-surface-variant');

                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            }
        }

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "visibility_off";
                icon.setAttribute('data-icon', 'visibility_off');
            } else {
                input.type = "password";
                icon.textContent = "visibility";
                icon.setAttribute('data-icon', 'visibility');
            }
        }
    </script>
</body></html>
