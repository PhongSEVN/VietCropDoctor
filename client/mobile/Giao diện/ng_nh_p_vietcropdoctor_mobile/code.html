<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4fcf0;
            overflow-x: hidden;
        }
        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.9);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>

<body class="bg-background text-on-background min-h-screen flex flex-col justify-center items-center px-container-padding-mobile">
<!-- Decorative Elements -->
<div class="fixed top-[-10%] left-[-10%] w-64 h-64 bg-primary opacity-5 rounded-full blur-3xl"></div>
<div class="fixed bottom-[-5%] right-[-5%] w-80 h-80 bg-secondary opacity-5 rounded-full blur-3xl"></div>
<!-- Main Login Container -->
<div class="w-full max-w-[400px] flex flex-col items-center">
<!-- Logo & Branding Section -->
<div class="mb-10 text-center animate-float">
<img alt="VietCropDoctor Logo" class="w-24 h-24 object-contain mx-auto mb-4 drop-shadow-sm" src="https://lh3.googleusercontent.com/aida/ADBb0ui_cgSsoIUY6vVa1x8QaNIHhsjlTXACNqyXNZ5l7LPSUoyF4z8-zWMSFhzkkmAIvdRRQqFT5AT5vbM-CBBqHWSrKWsMhoYtOi6nN2yz1_VMKHJg7JOwA05IWU9sOE3a9ukKpaSqCodJHJMlWnBOcTPr29KuhhL5iNZcwcyFGzpMUjbbWEScRQA2-LWBERf6QixOYLGF-k_Ap8TPGiclWP5SCf3znrwr1hillftA_8R1b9YQGdLaTRFBAMw"/>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">
                VietCropDoctor
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-1 opacity-80">
                Chuyên gia chẩn đoán cây trồng
            </p>
</div>
<!-- Form Section -->
<div class="w-full bg-surface-container-lowest border border-outline-variant p-gutter rounded-xl shadow-sm">
<form class="space-y-6" id="loginForm">
<!-- Input Group: Email/Phone -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="identity">
                        Email hoặc Số điện thoại
                    </label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline text-[20px]">person</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" id="identity" name="identity" placeholder="Nhập tài khoản" type="text"/>
</div>
</div>
<!-- Input Group: Password -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="password">
                        Mật khẩu
                    </label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline text-[20px]">lock</span>
<input class="w-full h-12 pl-10 pr-10 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 flex items-center justify-center text-outline hover:text-on-surface-variant" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="eyeIcon">visibility</span>
</button>
</div>
<div class="flex justify-end pt-1">
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Quên mật khẩu?</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-12 bg-primary text-on-primary font-title-md text-title-md rounded-lg shadow-sm hover:brightness-110 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                    Đăng nhập
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Social Login Divider -->
<div class="relative my-8 flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="mx-4 font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Hoặc</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-component-gap">
<button class="flex items-center justify-center h-12 border border-outline-variant rounded-lg hover:bg-surface transition-colors">
<img alt="Google" class="w-5 h-5 mr-2" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDVFH_s4fJ97hije___i5v8ESBfRPTA4JXslwYply6Ky2Qww0h7wmVjQvyErb2wkygoIhcrdbbwD8kgZUPtWR496bFfCxmaZdgmxyNdjLnWJAqAVDbqyXRia9vGd_UAzml398ki7rYcmmuzYDz57V_ndCazhyE97e-iyLnJq2WlA6v-c5cj2OU2WjhRwC1lYXn3ClarIqHEjxMh17Chnj2Jvxcf7xnTs-7t4byvLq63H3fXxGwP0nTYlYhKknDq-_TsJxzG9Z2kK2Da"/>
<span class="font-label-md text-label-md">Google</span>
</button>
<button class="flex items-center justify-center h-12 border border-outline-variant rounded-lg hover:bg-surface transition-colors">
<span class="material-symbols-outlined text-primary mr-2" data-weight="fill">social_leaderboard</span>
<span class="font-label-md text-label-md">Facebook</span>
</button>
</div>
</div>
<!-- Footer Links -->
<div class="mt-8 text-center space-y-4">
<p class="font-body-md text-body-md text-on-surface-variant">
                Chưa có tài khoản? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Đăng ký ngay</a>
</p>
<div class="flex items-center justify-center gap-4 text-outline font-label-sm text-label-sm">
<a class="hover:text-on-surface-variant transition-colors" href="#">Điều khoản</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="hover:text-on-surface-variant transition-colors" href="#">Bảo mật</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="hover:text-on-surface-variant transition-colors" href="#">Trợ giúp</a>
</div>
</div>
</div>
<!-- Background Pattern -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-5 overflow-hidden">
<div class="absolute inset-0" style="background-image: radial-gradient(#006b2c 1px, transparent 1px); background-size: 32px 32px;"></div>
</div>
<script>
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
            } else {
                pwdInput.type = 'password';
                eyeIcon.textContent = 'visibility';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Mock interaction
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                alert('Chức năng đang được phát triển. Vui lòng quay lại sau!');
            }, 1500);
        });
    </script>
</body></html>
